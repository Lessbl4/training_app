name: training_app
description: "Gymify - профессиональное приложение для тренировок"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  audioplayers: ^6.1.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.1
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  image_picker: ^1.0.7
  flutter_staggered_animations: ^1.1.1
  glassmorphism: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.63.0
  lucide_icons: ^0.257.0
  video_player: ^2.8.6
  sensors_plus: ^7.0.0
  firebase_storage: ^12.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/videos/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/images/simple_fire.png"
  android_12:
    color: "#000000"
    image: "assets/images/simple_fire.png"
    icon_background_color: "#000000"